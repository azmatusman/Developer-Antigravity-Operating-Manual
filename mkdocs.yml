site_name: Developer Antigravity Operating Manual
site_description: Disciplined, token-efficient development workflow for Antigravity IDE
site_url: https://azmatusman.github.io/Developer-Antigravity-Operating-Manual/
repo_url: https://github.com/azmatusman/Developer-Antigravity-Operating-Manual
repo_name: azmatusman/Developer-Antigravity-Operating-Manual
edit_uri: edit/main/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - content.action.edit
    - content.action.view

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search

nav:
  - Home: docs/README.md
  - Start Here: docs/START_HERE.md
  - Navigation Map: docs/NAVIGATION.md
  - Operating Model:
      - Setup Overview: docs/operating-model/SETUP_OVERVIEW.md
      - Visual Summary: docs/operating-model/VISUAL_SUMMARY.md
      - Session Management: docs/operating-model/SESSION_MANAGEMENT.md
      - Token Strategy: docs/operating-model/TOKEN_STRATEGY.md
  - Workflows:
      - Daily Loop: docs/workflows/DAILY_LOOP.md
      - /plan: docs/workflows/PLAN.md
      - /tdd: docs/workflows/TDD.md
      - /debug: docs/workflows/DEBUG.md
      - /review: docs/workflows/REVIEW.md
      - /document: docs/workflows/DOCUMENT.md
      - /optimize: docs/workflows/OPTIMIZE.md
      - /refactor: docs/workflows/REFACTOR.md
      - /hotfix: docs/workflows/HOTFIX.md
      - /sprint: docs/workflows/SPRINT.md
      - /onboard: docs/workflows/ONBOARD.md
      - /close-session: docs/workflows/CLOSE_SESSION.md
      - /new-knowledge-item: docs/workflows/NEW_KNOWLEDGE_ITEM.md
  - Skills:
      - Overview: docs/skills/OVERVIEW.md
      - Canonical Daily Skills: docs/skills/CANONICAL_DAILY_SKILLS.md
      - Internal Skills: docs/skills/INTERNAL_SKILLS.md
      - Model Tiering: docs/skills/MODEL_TIERING_WITH_SKILLS.md
  - Rules:
      - AGENTS.md: docs/rules/AGENTS_MD.md
      - GEMINI.md: docs/rules/GEMINI_MD.md
  - MCPs:
      - MCP Overview: docs/mcps/MCP_OVERVIEW.md
      - Sequential Thinking: docs/mcps/SEQUENTIAL_THINKING.md
      - Context7: docs/mcps/CONTEXT7.md
  - Graphify:
      - Graphify Guide: docs/graphify/GRAPHIFY_GUIDE.md
      - Graphify Workflow: docs/graphify/GRAPHIFY_WORKFLOW.md
  - Model Selection:
      - Right Model Right Task: docs/model-selection/RIGHT_MODEL_RIGHT_TASK.md
      - Tradeoffs: docs/model-selection/TRADEOFFS.md
      - Checklist: docs/model-selection/CHECKLIST.md
  - Examples:
      - Build a New App: docs/examples/EXAMPLE_NEW_APP.md
      - Debugging: docs/examples/EXAMPLE_DEBUG.md
      - Knowledge Items: docs/examples/EXAMPLE_KNOWLEDGE_ITEM.md
